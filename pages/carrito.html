<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito – Flora Cosmica</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main id="main-content">
    <div class="container py-5">
      <!-- Breadcrumb -->
      <nav class="breadcrumb-flora" aria-label="Miga de pan">
        <a href="../index.html">Inicio</a>
        <span aria-hidden="true">›</span>
        <span class="current">Carrito</span>
      </nav>

      <div class="section-header mb-4">
        <span class="section-label">Tu selección</span>
        <h1 style="font-size:2rem;">Carrito de compras</h1>
        <div class="deco-line mt-2"></div>
      </div>

      <div class="row g-4">
        <!-- Items del carrito -->
        <div class="col-lg-8">
          <div id="cart-items-container" aria-live="polite">
            <!-- JS renderiza aquí -->
          </div>
        </div>

        <!-- Resumen -->
        <div class="col-lg-4">
          <aside class="cart-summary" aria-label="Resumen del pedido">
            <h3>Resumen</h3>
            <div class="cart-summary-row">
              <span>Subtotal</span>
              <span id="summary-subtotal">$0</span>
            </div>
            <div class="cart-summary-row">
              <span>Envío galáctico</span>
              <span style="color:var(--accent);">Gratis</span>
            </div>
            <div class="cart-summary-row total">
              <span>Total</span>
              <span class="total-price" id="summary-total">$0</span>
            </div>
            <button
              class="btn-flora btn-flora-solid w-100 mt-4"
              id="checkout-btn"
              onclick="handleCheckout()">
              Proceder al pago
            </button>
            <a href="../index.html" class="btn-flora w-100 mt-2 justify-content-center" style="display:flex;">
              Seguir comprando
            </a>
          </aside>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = buildNavbar('carrito');
    document.getElementById('footer-placeholder').innerHTML = buildFooter('../');

    // Renderizar carrito
    function renderCartPage() {
      const container = document.getElementById('cart-items-container');
      const subtotalEl = document.getElementById('summary-subtotal');
      const totalEl = document.getElementById('summary-total');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="cart-empty" role="status">
            <span class="empty-icon">🪐</span>
            <h3>Tu carrito está vacío</h3>
            <p style="font-size:.9rem;margin-top:.5rem;">Explora nuestro catálogo y agrega tus plantas favoritas.</p>
            <a href="../index.html" class="btn-flora btn-flora-solid mt-4 d-inline-flex">Ir al catálogo</a>
          </div>`;
        subtotalEl.textContent = '$0';
        totalEl.textContent = '$0';
        return;
      }

      let subtotal = 0;

      container.innerHTML = cart.map(item => {
        const product = PRODUCTS.find(p => p.id === item.id);
        if (!product) return '';
        const lineTotal = product.price * item.qty;
        subtotal += lineTotal;
        return `
          <div class="cart-item fade-up" aria-label="${product.name} en el carrito">
            <div class="cart-item-emoji" aria-hidden="true">${product.emoji}</div>
            <div class="flex-grow-1">
              <div class="cart-item-name">${product.name}</div>
              <div class="cart-item-cat">${product.category}</div>
              <div class="cart-item-price mt-1">${formatPrice(lineTotal)}</div>
            </div>
            <div class="d-flex align-items-center gap-3">
              <div class="cart-qty">
                <button onclick="updateQty(${product.id}, -1)" aria-label="Reducir cantidad de ${product.name}">−</button>
                <span class="qty-num" aria-label="Cantidad: ${item.qty}">${item.qty}</span>
                <button onclick="updateQty(${product.id}, 1)" aria-label="Aumentar cantidad de ${product.name}">+</button>
              </div>
              <button
                class="btn-remove"
                onclick="removeFromCart(${product.id})"
                aria-label="Eliminar ${product.name} del carrito"
                title="Eliminar">
                ✕
              </button>
            </div>
          </div>
        `;
      }).join('');

      subtotalEl.textContent = formatPrice(subtotal);
      totalEl.textContent = formatPrice(subtotal);
    }

    function handleCheckout() {
      if (cart.length === 0) {
        showToast('🪐 Agrega plantas antes de continuar');
        return;
      }
      // Simular proceso de pago
      showToast('✦ ¡Pedido enviado a las estrellas! Gracias por tu compra.');
      cart = [];
      saveCart();
      updateCartUI();
      setTimeout(() => renderCartPage(), 400);
    }

    // Renderizar al cargar
    renderCartPage();
  </script>
</body>
</html>
