<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle de Producto – Flora Cosmica</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main id="main-content">
    <div class="container py-5">
      <!-- Breadcrumb -->
      <nav class="breadcrumb-flora" aria-label="Miga de pan">
        <a href="../index.html">Inicio</a>
        <span aria-hidden="true">›</span>
        <span class="current" id="bc-name">Producto</span>
      </nav>

      <!-- Contenido del producto (JS lo llena) -->
      <div id="product-detail">
        <div class="text-center py-5" style="color:var(--text-muted);">
          <span style="font-size:3rem;">🌀</span>
          <p class="mt-3">Cargando producto...</p>
        </div>
      </div>
    </div>

    <!-- Productos relacionados -->
    <section class="container pb-5">
      <div class="section-header">
        <span class="section-label">Descubre más</span>
        <h2>También te podría interesar</h2>
        <div class="deco-line mt-2"></div>
      </div>
      <div class="row g-4" id="related-grid"></div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = buildNavbar('');
    document.getElementById('footer-placeholder').innerHTML = buildFooter('../');

    // Obtener id de la URL
    const params = new URLSearchParams(window.location.search);
    const productId = parseInt(params.get('id'));
    const product = PRODUCTS.find(p => p.id === productId);

    // Renderizar detalle
    const detailEl = document.getElementById('product-detail');

    if (!product) {
      detailEl.innerHTML = `
        <div class="text-center py-5">
          <span style="font-size:4rem;">🔭</span>
          <h2 class="mt-3">Planta no encontrada en este cuadrante</h2>
          <a href="../index.html" class="btn-flora mt-3 d-inline-block">Volver al catálogo</a>
        </div>`;
    } else {
      // Breadcrumb
      document.getElementById('bc-name').textContent = product.name;
      document.title = `${product.name} – Flora Cosmica`;

      // Nivel de dificultad → color
      const diffColor = { Fácil: '#39ff7e', Media: '#c8a96e', Difícil: '#ff6b6b', Experto: '#9b59b6' };
      const dc = diffColor[product.care.dificultad] || 'var(--accent)';

      detailEl.innerHTML = `
        <div class="row g-5 align-items-start fade-up">
          <!-- Imagen -->
          <div class="col-md-5">
            <figure class="product-detail-img m-0" aria-label="Imagen de ${product.name}">
              <span class="product-detail-emoji">${product.emoji}</span>
            </figure>
            <!-- Stock -->
            <div class="mt-3 d-flex align-items-center gap-2">
              <span style="width:8px;height:8px;border-radius:50%;background:${product.stock > 5 ? 'var(--accent)' : '#ff6b6b'};display:inline-block;box-shadow:0 0 6px ${product.stock > 5 ? 'var(--accent)' : '#ff6b6b'}"></span>
              <span style="font-size:.85rem;color:var(--text-muted);">
                ${product.stock > 5 ? `${product.stock} unidades disponibles` : `¡Solo ${product.stock} unidades! Stock crítico.`}
              </span>
            </div>
          </div>

          <!-- Info -->
          <div class="col-md-7">
            <span class="product-detail-category">${product.category}</span>
            <h1 class="product-detail-title">${product.name}</h1>
            <div class="product-detail-price">${formatPrice(product.price)}</div>

            <p class="mt-4" style="color:var(--text-muted);line-height:1.8;">${product.desc}</p>

            <!-- Stats de cuidado -->
            <div class="detail-stats">
              <div class="detail-stat">
                <span class="stat-value">☀️ ${product.care.luz}</span>
                <span class="stat-label">Luz</span>
              </div>
              <div class="detail-stat">
                <span class="stat-value">💧 ${product.care.agua}</span>
                <span class="stat-label">Agua</span>
              </div>
              <div class="detail-stat">
                <span class="stat-value" style="color:${dc};">${product.care.dificultad}</span>
                <span class="stat-label">Dificultad</span>
              </div>
            </div>

            <!-- Cantidad y botón -->
            <div class="d-flex align-items-center gap-3 mt-2 flex-wrap">
              <div class="d-flex align-items-center gap-2">
                <label for="qty" style="font-size:.78rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);">Cantidad</label>
                <div class="cart-qty">
                  <button id="qty-minus" aria-label="Reducir cantidad">−</button>
                  <span class="qty-num" id="qty-display">1</span>
                  <button id="qty-plus" aria-label="Aumentar cantidad">+</button>
                </div>
              </div>
              <button
                class="btn-flora btn-flora-solid flex-grow-1"
                id="add-btn"
                aria-label="Agregar ${product.name} al carrito">
                Agregar al carrito
              </button>
            </div>

            <a href="../index.html" class="btn-flora mt-3 d-inline-flex">← Seguir explorando</a>
          </div>
        </div>
      `;

      // Lógica de cantidad
      let qty = 1;
      const qtyDisplay = document.getElementById('qty-display');

      document.getElementById('qty-minus').addEventListener('click', () => {
        if (qty > 1) { qty--; qtyDisplay.textContent = qty; }
      });
      document.getElementById('qty-plus').addEventListener('click', () => {
        if (qty < product.stock) { qty++; qtyDisplay.textContent = qty; }
      });
      document.getElementById('add-btn').addEventListener('click', () => {
        addToCart(product.id, qty);
      });
    }

    // Productos relacionados (máx. 4, excluyendo actual)
    const related = PRODUCTS.filter(p => p.id !== productId).slice(0, 4);
    document.getElementById('related-grid').innerHTML = related.map(p => `
      <div class="col-sm-6 col-lg-3">
        <article class="product-card">
          <div class="product-card-img">
            <span class="plant-emoji">${p.emoji}</span>
          </div>
          <div class="product-card-body">
            <span class="badge-flora">${p.category}</span>
            <h3>${p.name}</h3>
            <p class="desc">${p.shortDesc}</p>
            <div class="price">${formatPrice(p.price)}</div>
            <div class="d-flex gap-2 mt-3">
              <button class="btn-flora btn-flora-sm flex-grow-1" onclick="addToCart(${p.id})">+ Carrito</button>
              <a class="btn-flora btn-flora-sm" href="./detalle.html?id=${p.id}">Ver más</a>
            </div>
          </div>
        </article>
      </div>
    `).join('');
  </script>
</body>
</html>
